<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>HungDev News</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <div class="logo">HungDev</div>

    <nav class="menu">
      <a href="#">Trang chủ</a>
      <a href="#">Thông báo</a>
      <a href="#">Suy niệm</a>
      <a href="#">Tin tức</a>
      <a href="#">Media</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <img src="https://via.placeholder.com/1200x400">
</section>

<!-- MAIN -->
<div class="container main-layout">

  <!-- LEFT CONTENT -->
  <div class="main-content">

    <!-- SECTION 1 -->
    <section class="section">
      <h2>Suy niệm</h2>

      <div class="grid-3">
        <div class="card">
          <img src="https://via.placeholder.com/300x200">
          <h3>Bài viết 1</h3>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/300x200">
          <h3>Bài viết 2</h3>
        </div>

        <div class="card">
          <img src="https://via.placeholder.com/300x200">
          <h3>Bài viết 3</h3>
        </div>
      </div>
    </section>

    <!-- SECTION 2 -->
    <section class="section">
      <h2>Tin nổi bật</h2>

      <div class="grid-2">
        <div class="card large">
          <img src="https://via.placeholder.com/600x300">
          <h3>Bài nổi bật lớn</h3>
        </div>

        <div>
          <div class="small-post">Tin nhỏ 1</div>
          <div class="small-post">Tin nhỏ 2</div>
          <div class="small-post">Tin nhỏ 3</div>
        </div>
      </div>
    </section>

  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Thông báo</h3>

    <div class="sidebar-item">Thông báo 1</div>
    <div class="sidebar-item">Thông báo 2</div>
    <div class="sidebar-item">Thông báo 3</div>

    <h3>Tin mới</h3>

    <div class="sidebar-item">Tin mới 1</div>
    <div class="sidebar-item">Tin mới 2</div>
  </aside>

</div>

<!-- FOOTER -->
<footer class="footer">
  <p>© 2026 HungDev</p>
</footer>

</body>
</html>
