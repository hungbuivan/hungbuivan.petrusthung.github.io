<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

{% include header.html %}

<div class="post-container">

  <h1>{{ page.title }}</h1>

  {% if page.image %}
    <img src="{{ page.image }}" class="post-img">
  {% endif %}

  <p>📅 {{ page.date | date: "%d-%m-%Y" }}</p>

  {{ content }}

</div>

{% include footer.html %}

</body>
</html>
